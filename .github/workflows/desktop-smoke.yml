name: Desktop Smoke Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: windows-latest
            target: win
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install rpmbuild (Linux)
        if: matrix.target == 'linux'
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Package Desktop installers (${{ matrix.target }})
        working-directory: apps/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: node scripts/package.mjs --${{ matrix.target }} --x64 --arm64 --publish never

      - name: Upload Desktop artifacts (${{ matrix.target }})
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          path: apps/desktop/dist
          if-no-files-found: error
